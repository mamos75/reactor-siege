// ============================================================
const Audio = (() => {
  let ctx = null;
  let masterGain = null;
  let musicBus = null;    // music → compressor → master
  let sfxBus   = null;    // sfx   → compressor → master
  let comp     = null;    // master limiter/compressor

  // ── Music state ────────────────────────────────────────────
  const music = {
    buffer: null, source: null, gainNode: null, filterNode: null,
    running: false, intensity: 0, loaded: false,
    homeBuffer: null, homeSource: null, homeGain: null,
    homeLoaded: false, homePlaying: false,
    ambBuffer: null, ambSource: null, ambGain: null,
    ambLoaded: false
  };

  // ── Arcade combo sound ─────────────────────────────────────
  let arcadeBuffer = null;
  let arcadeLoaded = false;

  function _loadArcade() {
    if (arcadeLoaded) return;
    arcadeLoaded = true;
    fetch('sounds/arcade.mp3')
      .then(r => r.arrayBuffer())
      .then(ab => ctx.decodeAudioData(ab))
      .then(buf => { arcadeBuffer = buf; })
      .catch(e => console.warn('Arcade load failed:', e));
  }

  function _playArcade(volume, playbackRate = 1.0) {
    if (!arcadeBuffer) return;
    const src = ctx.createBufferSource();
    src.buffer = arcadeBuffer;
    src.playbackRate.value = playbackRate;
    const g = ctx.createGain();
    g.gain.value = Math.min(volume, 1.0);
    src.connect(g); g.connect(sfxBus);
    src.start(ctx.currentTime);
  }

  function _loadPowerup() {
    if (powerupBuffer || !ctx) return;
    const raw = atob(POWERUP_B64.split(',')[1]);
    const bytes = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
    ctx.decodeAudioData(bytes.buffer).then(buf => { powerupBuffer = buf; }).catch(()=>{});
  }

  function _playPowerup(volume) {
    if (!powerupBuffer) return;
    const src = ctx.createBufferSource();
    src.buffer = powerupBuffer;
    const g = ctx.createGain();
    g.gain.value = Math.min(volume, 1.0);
    src.connect(g);
    g.connect(sfxBus);
    src.start(ctx.currentTime);
  }

  function _loadExplosion() {
    if (explosionBuffer || !ctx) return;
    const raw = atob(EXPLOSION_B64.split(',')[1]);
    const bytes = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
    ctx.decodeAudioData(bytes.buffer).then(buf => { explosionBuffer = buf; }).catch(()=>{});
  }

  function _playExplosion(volume) {
    if (!explosionBuffer) return;
    const src = ctx.createBufferSource();
    src.buffer = explosionBuffer;
    const g = ctx.createGain();
    g.gain.value = Math.min(volume, 1.0);
    src.connect(g);
    g.connect(sfxBus);
    src.start(ctx.currentTime);
  }

  function init() {
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();

    // Master limiter — prevents clipping from layered SFX
    comp = ctx.createDynamicsCompressor();
    comp.threshold.value = -6;
    comp.knee.value      = 6;
    comp.ratio.value     = 4;
    comp.attack.value    = 0.003;
    comp.release.value   = 0.25;
    comp.connect(ctx.destination);

    masterGain = ctx.createGain();
    masterGain.gain.value = 0.85;
    masterGain.connect(comp);

    musicBus = ctx.createGain();
    musicBus.gain.value = 0.75;
    musicBus.connect(masterGain);

    sfxBus = ctx.createGain();
    sfxBus.gain.value = 1.0;
    sfxBus.connect(masterGain);
    _loadExplosion();
    _loadPowerup();
    _loadArcade();
  }

  function resume() { if (ctx && ctx.state === 'suspended') ctx.resume(); }

  // ── Low-level helpers ──────────────────────────────────────
  // Route to sfxBus by default; music helpers route to musicBus manually
  function osc(freq, type, start, dur, gainVal, gainEnd = 0.001, bus = null) {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, start);
    g.gain.setValueAtTime(Math.max(gainVal, 0.0001), start);
    g.gain.exponentialRampToValueAtTime(Math.max(gainEnd, 0.0001), start + dur);
    o.connect(g);
    g.connect(bus || sfxBus);
    o.start(start);
    o.stop(start + dur + 0.05);
    return { o, g };
  }

  function noise(start, dur, gainVal, gainEnd = 0.001, filter = null, bus = null) {
    const len = Math.ceil(ctx.sampleRate * dur);
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const d   = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const g = ctx.createGain();
    g.gain.setValueAtTime(Math.max(gainVal, 0.0001), start);
    g.gain.exponentialRampToValueAtTime(Math.max(gainEnd, 0.0001), start + dur);
    if (filter) {
      const f = ctx.createBiquadFilter();
      f.type = filter.type || 'bandpass';
      f.frequency.value = filter.freq || 1000;
      f.Q.value = filter.Q || 1;
      src.connect(f); f.connect(g);
    } else {
      src.connect(g);
    }
    g.connect(bus || sfxBus);
    src.start(start);
    src.stop(start + dur + 0.05);
    return { src, g };
  }

  // ── Dynamic gain — scales with combo + heat ────────────────
  function dynGain(base) {
    const combo = (typeof game !== 'undefined' && game.combo) || 0;
    const heat  = (typeof game !== 'undefined' && game.reactor) ? game.reactor.heat : 0;
    return Math.min(base + Math.min(combo * 0.035, 0.35) + (heat / 100) * 0.12, 0.95);
  }

  // ── Home screen music ─────────────────────────────────────
  // Home music uses a plain <audio> element — autoplay works without user gesture
  const _homeEl = document.getElementById('homeAudio');
  if (_homeEl) _homeEl.volume = 0.7;

  function preloadHomeMusic() {} // no-op, handled by <audio autoplay>
  function startHomeMusic()   {} // no-op, already playing via autoplay

  function _stopHomeMusic(cb) {
    if (!_homeEl) { if (cb) cb(); return; }
    // Quick fade out via volume ramp
    let vol = _homeEl.volume;
    const step = vol / 15;
    const iv = setInterval(() => {
      vol -= step;
      _homeEl.volume = Math.max(0, vol);
      if (vol <= 0) {
        clearInterval(iv);
        _homeEl.pause();
        _homeEl.currentTime = 0;
        if (cb) cb();
      }
    }, 20);
  }

  // ── Game music (main track) ────────────────────────────────
  function _startMusicPlayback() {
    if (!music.buffer || music.source) return; // guard: never double-start
    music.gainNode = ctx.createGain();
    music.gainNode.gain.value = 0.001;
    music.filterNode = ctx.createBiquadFilter();
    music.filterNode.type = 'lowpass';
    music.filterNode.frequency.value = 800;
    music.filterNode.Q.value = 0.7;
    music.source = ctx.createBufferSource();
    music.source.buffer = music.buffer;
    music.source.loop = true;
    music.source.connect(music.gainNode);
    music.gainNode.connect(music.filterNode);
    music.filterNode.connect(musicBus);
    music.source.start(ctx.currentTime);
    const t = ctx.currentTime;
    music.gainNode.gain.linearRampToValueAtTime(0.7, t + 3.0);
    music.filterNode.frequency.linearRampToValueAtTime(20000, t + 3.0);
  }

  // ── Ambient trap loop ──────────────────────────────────────
  function _startAmbientLayer() {
    if (!music.ambBuffer || music.ambSource) return; // guard: never double-start
    const src = ctx.createBufferSource();
    src.buffer = music.ambBuffer;
    src.loop = true;
    const g = ctx.createGain();
    g.gain.value = 0.18;
    src.connect(g); g.connect(musicBus);
    src.start(ctx.currentTime);
    music.ambSource = src;
    music.ambGain   = g;
  }

  // ── Music public API ───────────────────────────────────────
  function startAmbient() {
    init();
    if (music.running) return; // hard guard — called once only
    music.running = true;
    // Stop home music first, then start game music in callback
    _stopHomeMusic(() => {
      // Fetch + decode in parallel, start each only when ready
      fetch('sounds/music.mp3')
        .then(r => r.arrayBuffer())
        .then(ab => ctx.decodeAudioData(ab))
        .then(buf => { music.buffer = buf; _startMusicPlayback(); })
        .catch(e => console.warn('Game music load failed:', e));

      fetch('sounds/music_ambient.mp3')
        .then(r => r.arrayBuffer())
        .then(ab => ctx.decodeAudioData(ab))
        .then(buf => { music.ambBuffer = buf; _startAmbientLayer(); })
        .catch(e => console.warn('Ambient load failed:', e));
    });
  }

  // Called every frame — combo + heat modulate music volume + filter
  function updateAmbient(heat) {
    if (!music.gainNode || !music.filterNode) return;
    const combo = (typeof game !== 'undefined' && game.combo) || 0;
    const t     = ctx.currentTime;

    // Intensity level
    let level = 0;
    if (combo >= 10 || heat >= 85) level = 2;
    else if (combo >= 5  || heat >= 60) level = 1;

    if (level !== music.intensity) {
      music.intensity = level;
      const vol    = [0.65, 0.82, 1.0][level];
      const freq   = [6000, 14000, 20000][level];
      const ambVol = [0.18, 0.28, 0.4][level]; // ambient layer rises with intensity
      const fadeTC = 2.0;
      music.gainNode.gain.setTargetAtTime(vol,  t, fadeTC);
      music.filterNode.frequency.setTargetAtTime(freq, t, fadeTC);
      if (music.ambGain) music.ambGain.gain.setTargetAtTime(ambVol, t, fadeTC);
    }
  }

  // ── SFX ───────────────────────────────────────────────────
  const SFX = {

    // Basic bomb — sample @ 50% + sub thud layer
    explodeBasic() {
      init(); resume();
      const t = ctx.currentTime, g = dynGain(0.55);
      _playExplosion(g * 0.5);
      // Sub thud to add weight below the sample
      osc(48, 'sine', t, 0.32, g * 0.55, 0.001);
      osc(28, 'sine', t, 0.42, g * 0.38, 0.001);
      noise(t, 0.22, g * 0.3, 0.001, { type:'lowpass', freq:500, Q:0.8 });
    },

    // Chain — sample @ 70% + metallic ring cascade
    explodeChain() {
      init(); resume();
      const t = ctx.currentTime, g = dynGain(0.62);
      _playExplosion(g * 0.7);
      // Metallic ring on top of sample
      [1100, 850, 1550, 680].forEach((f, i) =>
        osc(f, 'sine', t + i * 0.055, 0.5 - i*0.1, g * (0.09 - i*0.012), 0.001)
      );
      noise(t, 0.3, g * 0.28, 0.001, { type:'bandpass', freq:950, Q:2.2 });
    },

    // Cryo — sample @ 40% pitched up + icy crystal layer
    explodeCryo() {
      init(); resume();
      const t = ctx.currentTime, g = dynGain(0.44);
      // Play sample but filtered hi-pass so it sounds icy
      if (explosionBuffer) {
        const src = ctx.createBufferSource();
        src.buffer = explosionBuffer;
        src.playbackRate.value = 1.35; // pitch up for icy feel
        const hpf = ctx.createBiquadFilter();
        hpf.type = 'highpass';
        hpf.frequency.value = 1200;
        const gn = ctx.createGain();
        gn.gain.value = g * 0.4;
        src.connect(hpf); hpf.connect(gn); gn.connect(sfxBus);
        src.start(t);
      }
      // Crystal shimmer on top
      [1900, 2600, 3400, 4200].forEach((f, i) =>
        osc(f, 'sine', t + i * 0.035, 0.38 - i*0.07, g * (0.16 - i*0.03), 0.001)
      );
      noise(t, 0.4, g * 0.3, 0.001, { type:'highpass', freq:4000, Q:0.6 });
      osc(52, 'sine', t, 0.42, g * 0.22, 0.001);
    },

    // Nuke — sample @ 100% (full) + cinematic sub layers + pre-suck
    explodeNuke() {
      init(); resume();
      const t = ctx.currentTime, g = dynGain(0.78);
      // Air suck (80ms before impact)
      noise(t, 0.08, 0.001, g * 0.28, { type:'lowpass', freq:300, Q:0.5 });
      // Play sample at 80ms delay, pitched down for massive feel
      if (explosionBuffer) {
        const src = ctx.createBufferSource();
        src.buffer = explosionBuffer;
        src.playbackRate.value = 0.72; // pitch down = bigger
        const gn = ctx.createGain();
        gn.gain.value = Math.min(g * 1.0, 1.0);
        src.connect(gn); gn.connect(sfxBus);
        src.start(t + 0.08);
        // Second layer: same sample slightly delayed, lower pitch = MASSIVE
        const src2 = ctx.createBufferSource();
        src2.buffer = explosionBuffer;
        src2.playbackRate.value = 0.55;
        const gn2 = ctx.createGain();
        gn2.gain.value = g * 0.45;
        src2.connect(gn2); gn2.connect(sfxBus);
        src2.start(t + 0.12);
      }
      // Sub pillars underneath
      [22, 38, 28].forEach((f, i) =>
        osc(f, 'sine', t + 0.08 + i*0.04, 0.9 - i*0.1, g * (0.8 - i*0.18), 0.001)
      );
      // High crack on top
      noise(t + 0.08, 0.1, g * 0.52, 0.001, { type:'highpass', freq:7000, Q:1.8 });
      // Long tail rumble
      noise(t + 0.5, 1.2, g * 0.2, 0.001, { type:'lowpass', freq:180, Q:0.3 });
    },

    // Bomb place — mechanical arming click
    placeBomb() {
      init(); resume();
      const t = ctx.currentTime;
      osc(520, 'square',   t,        0.04, 0.2,  0.001);
      osc(260, 'sine',     t + 0.02, 0.06, 0.12, 0.001);
      osc(1300,'sine',     t,        0.015,0.07, 0.001);
      noise(t, 0.035, 0.09, 0.001, { type:'bandpass', freq:3200, Q:6 });
    },

    // Energy pickup — power-up ping
    energyGain() {
      init(); resume();
      const t = ctx.currentTime;
      [523, 659, 784].forEach((f, i) =>
        osc(f, 'sine', t + i * 0.05, 0.12, 0.18, 0.001)
      );
      noise(t + 0.1, 0.12, 0.06, 0.001, { type:'highpass', freq:6000, Q:2 });
    },

    // Enemy kill — satisfying wet pop
    enemyKill() {
      init(); resume();
      const t = ctx.currentTime, g = dynGain(0.2);
      osc(360, 'sine',     t, 0.14, g,       0.001);
      osc(720, 'sine',     t, 0.1,  g * 0.8, 0.001);
      osc(190, 'triangle', t, 0.08, g * 0.6, 0.001);
      noise(t, 0.11, g * 0.58, 0.001, { type:'bandpass', freq:2800, Q:3.2 });
    },

    // Player hit — harsh distorted alarm
    playerHit() {
      init(); resume();
      const t = ctx.currentTime;
      osc(110, 'sawtooth', t,        0.32, 0.65, 0.001);
      osc(68,  'square',   t,        0.26, 0.52, 0.001);
      osc(220, 'sawtooth', t + 0.06, 0.2,  0.38, 0.001);
      noise(t, 0.28, 0.42, 0.001, { type:'lowpass', freq:650, Q:1.1 });
      osc(700, 'square', t + 0.06, 0.1, 0.22, 0.001);
    },

    // Meltdown — reactor critical: rising alarm + cinematic sub boom
    meltdown() {
      init(); resume();
      const t = ctx.currentTime;
      // Rising alarm cascade
      for (let i = 0; i < 5; i++) {
        osc(880 + i*50, 'square', t + i*0.14,        0.11, 0.48, 0.001);
        osc(660 + i*25, 'square', t + i*0.14 + 0.07, 0.07, 0.32, 0.001);
      }
      // Sub boom
      osc(32,  'sine', t + 0.1, 0.95, 0.75, 0.001);
      osc(52,  'sine', t + 0.2, 0.85, 0.6,  0.001);
      noise(t, 0.9, 0.65, 0.001, { type:'lowpass', freq:380, Q:0.7 });
      noise(t + 0.25, 0.75, 0.38, 0.001, { type:'bandpass', freq:145, Q:0.4 });
    },

    // Combo tick — arcade sample pitched up per level + synth sparkle
    combo(level) {
      init(); resume();
      const vol  = Math.min(0.18 + level * 0.025, 0.7);
      // Pitch rises with combo: level 2=1.0x, level 5=1.2x, level 10=1.5x, level 15=2.0x
      const rate = Math.min(1.0 + (level - 2) * 0.04, 2.2);
      _playArcade(vol, rate);
      // Add synth shimmer on top for high combos
      if (level >= 8) {
        const t    = ctx.currentTime;
        const root = 440 + level * 40;
        noise(t, 0.06, vol * 0.25, 0.001, { type:'bandpass', freq:root * 3, Q:8 });
        osc(root * 2, 'sine', t, 0.06, vol * 0.3, 0.001);
      }
      if (level >= 12) {
        // MAX COMBO — stab chord over the arcade hit
        const t = ctx.currentTime;
        [523, 659, 784, 1047].forEach((f, i) =>
          osc(f, 'sine', t + i*0.018, 0.1, vol * 0.45, 0.001)
        );
      }
    },

    // Upgrade — real power-up sample + synthèse chime
    upgrade() {
      init(); resume();
      _playPowerup(0.85);
      // Synthèse shimmer on top
      const t = ctx.currentTime;
      [784, 1047, 1319].forEach((f, i) =>
        osc(f, 'sine', t + i*0.07 + 0.1, 0.12, 0.1, 0.001)
      );
    },

    // Wave clear — power-up louder + triumphant chord
    waveClear() {
      init(); resume();
      _playPowerup(1.0);
      const t = ctx.currentTime;
      [392, 523, 659, 784].forEach((f, i) => {
        osc(f,     'sine', t + i*0.08 + 0.15, 0.28, 0.22, 0.001);
        osc(f * 2, 'sine', t + i*0.08 + 0.15, 0.12, 0.09, 0.001);
      });
      noise(t + 0.5, 0.35, 0.1, 0.001, { type:'highpass', freq:5500, Q:1.2 });
    },

    // Move — ultra-subtle grid step
    move() {
      init(); resume();
      const t = ctx.currentTime;
      osc(210, 'sine',   t, 0.032, 0.048, 0.001);
      osc(420, 'square', t, 0.012, 0.025, 0.001);
    },

    // Freeze — crystalline shard burst
    freeze() {
      init(); resume();
      const t = ctx.currentTime;
      [2100, 2900, 3700, 4600].forEach((f, i) =>
        osc(f, 'sine', t + i*0.028, 0.14 - i*0.028, 0.11 - i*0.022, 0.001)
      );
      noise(t, 0.2, 0.16, 0.001, { type:'highpass', freq:5500, Q:2.8 });
    },
  };

  return { SFX, startAmbient, updateAmbient, startHomeMusic, preloadHomeMusic, init, resume };
})();

// ============================================================
// GRID BUILDING
// ============================================================
function buildGrid() {
  const grid = [];
  for (let r = 0; r < GRID_ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < GRID_COLS; c++) {
      if (r === 0 || r === GRID_ROWS-1 || c === 0 || c === GRID_COLS-1 ||
          (r % 2 === 0 && c % 2 === 0)) {
        grid[r][c] = { type: T_WALL, hp: 99 };
      } else {
        grid[r][c] = { type: T_FLOOR, hp: 0 };
      }
    }
  }
  const safeZone = new Set(['1,1','2,1','1,2','3,1','1,3']);
  for (let r = 0; r < GRID_ROWS; r++) {
    for (let c = 0; c < GRID_COLS; c++) {
      if (grid[r][c].type === T_FLOOR && !safeZone.has(c+','+r)) {
        if (Math.random() < 0.5) {
          grid[r][c] = { type: T_SOFT, hp: 1 };
        }
      }
    }
  }
  return grid;
}

function tileAt(c, r) {
  if (c < 0 || c >= GRID_COLS || r < 0 || r >= GRID_ROWS) return null;
  return game.grid[r][c];
}

function isPassable(c, r) {
  const t = tileAt(c, r);
  return t && t.type === T_FLOOR;
}

function tileToPixel(c, r) {
  return {
    x: GRID_OFFSET_X + c * TILE + TILE/2,
    y: GRID_OFFSET_Y + r * TILE + TILE/2
  };
}

// ============================================================
// BFS PATHFINDING
// ============================================================
function findPath(grid, start, target) {
  if (start.col === target.col && start.row === target.row) return [];
  const visited = new Set();
  const queue = [[start]];
  visited.add(start.col+','+start.row);
  const dirs = [{dc:0,dr:-1},{dc:0,dr:1},{dc:-1,dr:0},{dc:1,dr:0}];
  while (queue.length > 0) {
    const path = queue.shift();
    const cur = path[path.length - 1];
    for (const d of dirs) {
      const nc = cur.col + d.dc;
      const nr = cur.row + d.dr;
      const key = nc+','+nr;
      if (visited.has(key)) continue;
      visited.add(key);
      const t = tileAt(nc, nr);
      if (!t || t.type === T_WALL || t.type === T_SOFT) continue;
      const newPath = [...path, {col:nc, row:nr}];
      if (nc === target.col && nr === target.row) return newPath.slice(1);
      queue.push(newPath);
    }
  }
  return [];
}

// ============================================================
// WAVE SPAWNING
// ============================================================
function spawnWave(waveNum) {
  game.enemies = [];
  const corners = [
    {col:1, row:1}, {col:11, row:1}, {col:1, row:11}, {col:11, row:11}
  ];
  let chasers = 0, saboteurs = 0, cowards = 0;
  if (waveNum === 1) { chasers = 4; }
  else if (waveNum === 2) { chasers = 3; saboteurs = 2; }
  else if (waveNum === 3) { chasers = 3; saboteurs = 2; cowards = 2; }
  else {
    chasers = 3 + Math.floor((waveNum-3) * 1.5);
    saboteurs = 2 + Math.floor((waveNum-3));
    cowards = 2 + Math.floor((waveNum-3));
  }

  let count = 0;
  const speedMult = 1 + (waveNum-1) * 0.08;

  function spawnEnemies(type, n) {
    for (let i = 0; i < n; i++) {
      const corner = corners[count % 4];
      count++;
      let sc = corner.col, sr = corner.row;
      for (let attempt = 0; attempt < 20; attempt++) {
        const tc = corner.col + (Math.floor(Math.random()*3)-1);
        const tr = corner.row + (Math.floor(Math.random()*3)-1);
        if (tileAt(tc, tr) && tileAt(tc, tr).type === T_FLOOR) {
          sc = tc; sr = tr; break;
        }
      }
      const pos = tileToPixel(sc, sr);
      const e = {
        type, col: sc, row: sr,
        px: pos.x, py: pos.y,
        targetPx: pos.x, targetPy: pos.y,
        moving: false,
        moveProgress: 0,
        moveTimer: 0,
        pathTimer: 0,
        path: [],
        frozen: 0,
        frozenTimer: 0,
        hp: type === 'SABOTEUR' ? 2 : 1,
        color: type === 'CHASER' ? '#ff6600' : type === 'SABOTEUR' ? '#ff0088' : '#ffcc00',
        moveInterval: type === 'CHASER' ? 800/speedMult : type === 'SABOTEUR' ? 1200/speedMult : 1000/speedMult,
        id: Math.random()
      };
      game.enemies.push(e);
    }
  }
  spawnEnemies('CHASER', chasers);
  spawnEnemies('SABOTEUR', saboteurs);
  spawnEnemies('COWARD', cowards);
  game.waveState = 'fighting';
  game.chainLength = 0;
}

// ============================================================
// BOMB PLACEMENT
// ============================================================
function placeBomb() {
  const p = game.player;
  const btype = BOMB_TYPES[p.selectedBomb];

  let range = btype.range;
  if (p.selectedBomb === 'CHAIN') range += game.chainRangeBonus;

  let heat = btype.heat;
  if (p.selectedBomb === 'BASIC') heat -= game.heatSinkBonus;

  let power = btype.power;
  if (p.selectedBomb === 'NUKE') power += game.nukeBonus;

  if (game.reactor.energy < btype.energyCost) {
    game.notEnoughEnergyTimer = 1500;
    return;
  }
  if (game.bombs.filter(b => !b.exploding).length >= game.maxBombs) return;
  if (game.bombs.find(b => b.col === p.col && b.row === p.row && !b.exploding)) return;
  if (!isPassable(p.col, p.row)) return;

  game.reactor.energy -= btype.energyCost;

  const bomb = {
    col: p.col, row: p.row,
    type: p.selectedBomb,
    power, heat, range,
    delay: btype.delay * 1000,
    timer: 0,
    color: btype.color,
    exploding: false,
    pulsePhase: 0
  };
  game.bombs.push(bomb);
  Audio.SFX.placeBomb();
}

// ============================================================
// EXPLOSION LOGIC
// ============================================================
function explodeBomb(bomb) {
  bomb.exploding = true;
  game.totalExplosions++;

  // Audio + haptic
  if (bomb.type === 'BASIC') { Audio.SFX.explodeBasic(); if (navigator.vibrate) navigator.vibrate(25); }
  else if (bomb.type === 'CHAIN') { Audio.SFX.explodeChain(); if (navigator.vibrate) navigator.vibrate([30, 10, 30]); }
  else if (bomb.type === 'CRYO') { Audio.SFX.explodeCryo(); if (navigator.vibrate) navigator.vibrate(20); }
  else if (bomb.type === 'NUKE') { Audio.SFX.explodeNuke(); if (navigator.vibrate) navigator.vibrate([80, 20, 80, 20, 80]); }

  const affected = getExplosionTiles(bomb.col, bomb.row, bomb.range, bomb.type);

  // Screen shake — exponential decay handled in update
  addScreenShake(bomb.power * 1.5);
  game.flashAlpha = Math.min(1, bomb.power * 0.1 + 0.05);

  // Explosion visuals
  for (const tile of affected) {
    game.explosions.push({
      col: tile.col, row: tile.row,
      timer: 0, maxTime: 400,
      color: bomb.color
    });
  }

  // CRYO effect
  if (bomb.type === 'CRYO') {
    game.blueFlash = 0.6;
    game.blueFlashTimer = 1000; // 1 second tint
    for (const e of game.enemies) {
      if (affected.find(t => t.col === e.col && t.row === e.row)) {
        e.frozen = 1;
        e.frozenTimer = 3000;
        Audio.SFX.freeze();
      }
    }
    game.reactor.heat = Math.max(0, game.reactor.heat + bomb.heat);
  } else {
    let heatAdd = bomb.heat;
    game.reactor.heat = Math.min(game.reactor.maxHeat + 30, game.reactor.heat + heatAdd);
  }

  // Gain energy from explosion
  const energyGain = bomb.power * 3;
  game.reactor.energy = Math.min(200, game.reactor.energy + energyGain);
  if (energyGain > 0) Audio.SFX.energyGain();

  // Destroy tiles
  for (const tile of affected) {
    const t = tileAt(tile.col, tile.row);
    if (t && t.type === T_SOFT) {
      t.hp -= bomb.power;
      if (t.hp <= 0) {
        t.type = T_FLOOR;
        t.hp = 0;
        const p = tileToPixel(tile.col, tile.row);
        for (let i = 0; i < 4; i++) {
          addParticle(p.x, p.y, '#8844cc', Math.random()*2+1);
        }
      }
    }
  }

  // Kill enemies — with typed death effects
  let killsThisExplosion = 0;
  for (let i = game.enemies.length - 1; i >= 0; i--) {
    const e = game.enemies[i];
    if (affected.find(t => t.col === e.col && t.row === e.row)) {
      e.hp -= bomb.power;
      if (e.hp <= 0) {
        Audio.SFX.enemyKill();
        // Combo
        const wasCombo = game.combo;
        game.comboTimer = 2000;
        game.combo = Math.min(game.combo + 1, 20);
        game.comboTextScale = 1.4; // pulse on new combo
        if (game.combo >= 2) Audio.SFX.combo(game.combo);

        const multiplier = 1 + (game.combo - 1) * 0.5;
        const pts = Math.floor(100 * multiplier);
        game.score += pts;
        game.kills++;
        killsThisExplosion++;

        const ep = tileToPixel(e.col, e.row);

        // Floating damage number
        let dmgText = '+' + pts;
        let dmgColor = '#ffffff';
        if (bomb.type === 'CRYO') { dmgText = '+FROZEN'; dmgColor = '#88ccff'; }
        else if (game.combo >= 3) { dmgText = '+CHAIN x' + game.combo; dmgColor = '#00ffff'; }
        addFloatingText(dmgText, ep.x, ep.y - 10, dmgColor, 'bold 22px monospace');

        // Typed death effects
        spawnEnemyDeathEffect(e.type, ep.x, ep.y, e.color);

        // Brief white flash on enemy (particle burst)
        for (let j = 0; j < 3; j++) addParticle(ep.x, ep.y, '#ffffff', Math.random()*1.5+0.5);

        // COWARD kill: show heat saved text
        if (e.type === 'COWARD') {
          addFloatingText('HEAT -5', ep.x, ep.y - 30, '#aaddff', 'bold 14px monospace');
        }

        game.enemies.splice(i, 1);
      }
    }
  }

  // CHAIN reaction
  if (bomb.type === 'CHAIN') {
    game.chainLength++;

    // Chain particle burst at bomb center
    const cp = tileToPixel(bomb.col, bomb.row);
    for (let j = 0; j < 10; j++) addParticle(cp.x, cp.y, '#ff00ff', Math.random()*2+1);

    if (game.chainLength >= 3) {
      game.slowmo = 0.25;
      game.slowmoTimer = 600;
      addFloatingText('CHAIN x' + game.chainLength, CANVAS_W/2, CANVAS_H/2 - 80, '#ff00ff', 'bold 28px monospace');
    }
    if (game.chainLength >= 5) {
      addScreenShake(bomb.power * 4.5); // x3 intensity
      game.flashAlpha = 0.9; // massive white flash
      addFloatingText('CHAIN x' + game.chainLength, CANVAS_W/2, CANVAS_H/2 - 80, '#ff00ff', 'bold 36px monospace');
    }

    for (const b of game.bombs) {
      if (b === bomb || b.exploding) continue;
      if (affected.find(t => t.col === b.col && t.row === b.row)) {
        b.timer = b.delay;
      }
    }
  }

  // Meltdown check
  if (game.reactor.heat >= game.reactor.maxHeat) {
    triggerMeltdown();
  }
}

function getExplosionTiles(col, row, range, type) {
  const tiles = [{col, row}];
  const dirs = [{dc:0,dr:-1},{dc:0,dr:1},{dc:-1,dr:0},{dc:1,dr:0}];
  for (const d of dirs) {
    for (let i = 1; i <= range; i++) {
      const nc = col + d.dc * i;
      const nr = row + d.dr * i;
      const t = tileAt(nc, nr);
      if (!t || t.type === T_WALL) break;
      tiles.push({col:nc, row:nr});
      if (t.type === T_SOFT) break;
    }
  }
  return tiles;
}

function triggerMeltdown() {
  Audio.SFX.meltdown();
  game.meltdownEffect = 1500; // longer meltdown display
  addScreenShake(20);
  game.flashAlpha = 0.9;
  if (game.reactorShield > 0) {
    game.reactorShield--;
  } else {
    for (let r = 0; r < GRID_ROWS; r++) {
      for (let c = 0; c < GRID_COLS; c++) {
        const t = game.grid[r][c];
        if (t.type === T_SOFT && Math.random() < 0.4) {
          t.type = T_FLOOR; t.hp = 0;
          const p = tileToPixel(c, r);
          for (let i = 0; i < 2; i++) addParticle(p.x, p.y, '#ff4400', Math.random()*2+1);
        }
      }
    }
    hitPlayer();
  }
  game.reactor.heat = 50;
  // Big centered meltdown text via floating text system with special flag
  addFloatingText('MELTDOWN!', CANVAS_W/2, CANVAS_H/2 - 50, '#ff4400', 'bold 52px monospace');
}

// ============================================================
// PLAYER HIT
// ============================================================
function hitPlayer() {
  if (game.player.invincible > 0) return;
  Audio.SFX.playerHit();
  game.player.lives--;
  game.player.livesFlash = 600; // heart pulse
  game.player.invincible = 2000;
  addScreenShake(10);
  if (game.player.lives <= 0) {
    game.state = 'gameover';
  }
}

// ============================================================
// PARTICLES & FLOATING TEXT
// ============================================================
function addParticle(x, y, color, size) {
  game.particles.push({
    x, y, vx: (Math.random()-0.5)*150, vy: (Math.random()-0.5)*150 - 60,
    size, color, alpha: 1, life: 600
  });
}

function addFloatingText(text, x, y, color, font) {
  game.floatingTexts.push({
    text, x, y,
    vy: -60,
    alpha: 1,
    color,
    font: font || 'bold 16px monospace',
    life: 1200
  });
}

function addScreenShake(intensity) {
  game.screenShake.intensity = Math.max(game.screenShake.intensity, intensity);
}

// ============================================================
// ENEMY DEATH EFFECTS
// ============================================================
function spawnEnemyDeathEffect(type, x, y, color) {
  const effect = { type, x, y, color, life: 400, maxLife: 400, particles: [] };

  if (type === 'CHASER') {
    // 8 orange sparks
    for (let i = 0; i < 8; i++) {
      const angle = (Math.PI * 2 / 8) * i;
      const speed = 80 + Math.random() * 60;
      effect.particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        alpha: 1,
        color: '#ff6600',
        size: Math.random() * 2 + 2
      });
    }
  } else if (type === 'SABOTEUR') {
    // 6 magenta diamond shapes spinning out
    for (let i = 0; i < 6; i++) {
      const angle = (Math.PI * 2 / 6) * i;
      const speed = 60 + Math.random() * 50;
      effect.particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        alpha: 1,
        color: '#ff00ff',
        size: 5 + Math.random() * 3,
        isDiamond: true,
        rotation: angle
      });
    }
  } else if (type === 'COWARD') {
    // Yellow explosion burst
    for (let i = 0; i < 12; i++) {
      const angle = (Math.PI * 2 / 12) * i;
      const speed = 50 + Math.random() * 80;
      effect.particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        alpha: 1,
        color: '#ffcc00',
        size: Math.random() * 3 + 1
      });
    }
  }

  game.enemyDeathEffects.push(effect);
}

// ============================================================
// UPGRADE SYSTEM
// ============================================================
function generateUpgrades() {
  const pool = [...ALL_UPGRADES];
  const choices = [];
  for (let i = 0; i < 3 && pool.length > 0; i++) {
    const idx = Math.floor(Math.random() * pool.length);
    choices.push(pool.splice(idx, 1)[0]);
  }
  return choices;
}

function showUpgradeScreen() {
  game.upgradeChoices = generateUpgrades();
  game.state = 'upgrade';
  game.upgradeAnimTimer = 0;
}

function applyUpgrade(idx) {
  if (idx < 0 || idx >= game.upgradeChoices.length) return;
  Audio.SFX.upgrade();
  const u = game.upgradeChoices[idx];
  u.apply(game);
  addFloatingText(u.name+'!', CANVAS_W/2, 200, '#00ff88', 'bold 18px monospace');
  game.state = 'playing';
  game.lastUpgradeTime = Date.now();
}

// EXPLOSION PREVIEW
// ============================================================
function getPreviewTiles() {
  const p = game.player;
  const btype = BOMB_TYPES[p.selectedBomb];
  let range = btype.range;
  if (p.selectedBomb === 'CHAIN') range += game.chainRangeBonus;
  return getExplosionTiles(p.col, p.row, range, p.selectedBomb);
}

// ============================================================
// INPUT
// ============================================================
const keys = {};
document.addEventListener('keydown', (e) => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  keys[e.key] = true;

  if (game.state === 'start' && e.key === 'Enter') {
    game.state = 'playing';
    game.startTime = Date.now();
    Audio.startAmbient();
    return;
  }
  if (game.state === 'gameover' || game.state === 'win') {
    if (e.key === 'r' || e.key === 'R') { initGame(); return; }
  }
  if (game.state === 'upgrade') {
    if (e.key === '1') { applyUpgrade(0); return; }
    if (e.key === '2') { applyUpgrade(1); return; }
    if (e.key === '3') { applyUpgrade(2); return; }
    return;
  }
  if (game.state !== 'playing') return;

  if (e.key === '1') game.player.selectedBomb = 'BASIC';
  if (e.key === '2') game.player.selectedBomb = 'CHAIN';
  if (e.key === '3') game.player.selectedBomb = 'CRYO';
  if (e.key === '4') game.player.selectedBomb = 'NUKE';

  if (e.key === ' ') placeBomb();
});
document.addEventListener('keyup', (e) => { keys[e.key] = false; });

// ============================================================
// TOUCH CONTROLS — split screen: joystick left / bomb right
// ============================================================
const joystick = {
  active: false,
  baseX: 0, baseY: 0,   // screen coords (pixels)
  curX: 0,  curY: 0,
  radius: 55,           // max drag distance (screen px)
  touchId: null,
  dirX: 0, dirY: 0      // normalised -1..1
};

let rightTouchId = null; // right-half touch for bomb

(function setupTouch() {
  function toCanvas(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    return {
      cx: (clientX - rect.left) * (CANVAS_W / rect.width),
      cy: (clientY - rect.top)  * (CANVAS_H / rect.height)
    };
  }

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    Audio.init(); Audio.resume();
    for (const t of e.changedTouches) {
      if (t.clientX < window.innerWidth / 2) {
        // Left half → joystick base
        if (joystick.touchId !== null) continue;
        joystick.touchId = t.identifier;
        joystick.active  = true;
        joystick.baseX   = t.clientX;
        joystick.baseY   = t.clientY;
        joystick.curX    = t.clientX;
        joystick.curY    = t.clientY;
        joystick.dirX    = 0;
        joystick.dirY    = 0;
      } else {
        // Right half → bomb button (on release)
        if (rightTouchId !== null) continue;
        rightTouchId = t.identifier;
      }
    }
    // Non-touch states: start / upgrade
    for (const t of e.changedTouches) {
      if (game.state === 'start') {
        game.state = 'playing';
        game.startTime = Date.now();
        Audio.startAmbient();
      }
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier !== joystick.touchId) continue;
      const dx = t.clientX - joystick.baseX;
      const dy = t.clientY - joystick.baseY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const clamped = Math.min(dist, joystick.radius);
      const angle = Math.atan2(dy, dx);
      joystick.curX = joystick.baseX + Math.cos(angle) * clamped;
      joystick.curY = joystick.baseY + Math.sin(angle) * clamped;
      joystick.dirX = dx / joystick.radius;
      joystick.dirY = dy / joystick.radius;

      // Map to 4-directional keys
      ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].forEach(k => keys[k] = false);
      if (dist > joystick.radius * 0.25) { // dead zone 25%
        if (Math.abs(dx) > Math.abs(dy)) {
          keys[dx > 0 ? 'ArrowRight' : 'ArrowLeft'] = true;
        } else {
          keys[dy > 0 ? 'ArrowDown' : 'ArrowUp'] = true;
        }
      }
    }
  }, { passive: false });

  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier === joystick.touchId) {
        joystick.active  = false;
        joystick.touchId = null;
        joystick.dirX    = 0;
        joystick.dirY    = 0;
        ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].forEach(k => keys[k] = false);
      }
      if (t.identifier === rightTouchId) {
        rightTouchId = null;
        // Right tap → action
        if (game.state === 'playing') {
          placeBomb();
          if (navigator.vibrate) navigator.vibrate(18);
        }
        if (game.state === 'upgrade') {
          // tap right side → card 3, middle → 2, left → 1
          const rel = t.clientX / window.innerWidth;
          if (rel < 0.33) applyUpgrade(0);
          else if (rel < 0.67) applyUpgrade(1);
          else applyUpgrade(2);
        }
      }
    }
  }, { passive: false });
})();

// ============================================================
// DRAW JOYSTICK (called from drawGame)
// ============================================================
function drawJoystick() {
  if (!joystick.active) return;
  const rect = canvas.getBoundingClientRect();
  const sx = CANVAS_W / rect.width;
  const sy = CANVAS_H / rect.height;
  const bx = (joystick.baseX - rect.left) * sx;
  const by = (joystick.baseY - rect.top) * sy;
  const cx2 = (joystick.curX - rect.left) * sx;
  const cy2 = (joystick.curY - rect.top) * sy;
  const r = joystick.radius * sx;

  ctx.save();
  ctx.globalAlpha = 0.35;
  ctx.strokeStyle = '#00ffff';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(bx, by, r, 0, Math.PI*2); ctx.stroke();
  ctx.fillStyle = 'rgba(0,255,255,0.08)';
  ctx.fill();
  // Knob
  ctx.globalAlpha = 0.6;
  ctx.fillStyle = '#00ffff';
  ctx.shadowColor = '#00ffff';
  ctx.shadowBlur = 12;
  ctx.beginPath(); ctx.arc(cx2, cy2, r * 0.38, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

// Draw bomb button (right side overlay)
function drawBombButton() {
  const rect = canvas.getBoundingClientRect();
  const sx = CANVAS_W / rect.width;
  const bx = CANVAS_W - 80;
  const by = CANVAS_H - 80;
  const r = 50;
  ctx.save();
  ctx.globalAlpha = 0.4;
  const btype = BOMB_TYPES[game.player.selectedBomb];
  ctx.fillStyle = btype.color + '33';
  ctx.strokeStyle = btype.color;
  ctx.lineWidth = 2;
  ctx.shadowColor = btype.color;
  ctx.shadowBlur = 12;
  ctx.beginPath(); ctx.arc(bx, by, r, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.globalAlpha = 0.9;
  ctx.fillStyle = btype.color;
  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('💣', bx, by);
  ctx.restore();
}

// ============================================================
// PLAYER MOVEMENT
// ============================================================
function updatePlayer(dt) {
  const p = game.player;
  if (p.invincible > 0) p.invincible -= dt;
  if (p.livesFlash > 0) p.livesFlash -= dt;

  if (p.moving) {
    p.moveProgress += dt / 100;
    if (p.moveProgress >= 1) {
      p.moveProgress = 1;
      p.moving = false;
      p.px = p.targetPx;
      p.py = p.targetPy;
    } else {
      p.px = p.startPx + (p.targetPx - p.startPx) * p.moveProgress;
      p.py = p.startPy + (p.targetPy - p.startPy) * p.moveProgress;
    }
    return;
  }

  if (p.inputCooldown > 0) { p.inputCooldown -= dt; return; }

  let dc = 0, dr = 0;
  if (keys['ArrowUp']    || keys['w'] || keys['W']) dr = -1;
  else if (keys['ArrowDown']  || keys['s'] || keys['S']) dr = 1;
  else if (keys['ArrowLeft']  || keys['a'] || keys['A']) dc = -1;
  else if (keys['ArrowRight'] || keys['d'] || keys['D']) dc = 1;

  if (dc === 0 && dr === 0) return;

  const nc = p.col + dc, nr = p.row + dr;
  const t = tileAt(nc, nr);
  if (!t || t.type !== T_FLOOR) return;
  if (game.bombs.find(b => b.col === nc && b.row === nr && !b.exploding)) return;

  p.startPx = p.px;
  p.startPy = p.py;
  p.col = nc; p.row = nr;
  const tp = tileToPixel(nc, nr);
  p.targetPx = tp.x;
  p.targetPy = tp.y;
  p.moving = true;
  p.moveProgress = 0;
  p.inputCooldown = 80;
  Audio.SFX.move();
}

// ============================================================
// ENEMY UPDATE
// ============================================================
function updateEnemies(dt) {
  for (const e of game.enemies) {
    if (e.frozen) {
      e.frozenTimer -= dt;
      if (e.frozenTimer <= 0) { e.frozen = 0; e.frozenTimer = 0; }
    }

    if (e.moving) {
      e.moveProgress += dt / 120;
      if (e.moveProgress >= 1) {
        e.moveProgress = 1;
        e.moving = false;
        e.px = e.targetPx;
        e.py = e.targetPy;
      } else {
        e.px = e.startPx + (e.targetPx - e.startPx) * e.moveProgress;
        e.py = e.startPy + (e.targetPy - e.startPy) * e.moveProgress;
      }
    }

    if (e.frozen || e.moving) continue;

    e.moveTimer += dt;
    if (e.moveTimer < e.moveInterval) continue;
    e.moveTimer = 0;

    e.pathTimer += e.moveInterval;
    if (e.pathTimer >= 500 || e.path.length === 0) {
      e.pathTimer = 0;
      e.path = calcEnemyPath(e);
    }

    if (e.path.length > 0) {
      const next = e.path.shift();
      if (game.bombs.find(b => b.col === next.col && b.row === next.row && !b.exploding)) {
        e.path = [];
        continue;
      }
      e.startPx = e.px; e.startPy = e.py;
      e.col = next.col; e.row = next.row;
      const tp = tileToPixel(next.col, next.row);
      e.targetPx = tp.x; e.targetPy = tp.y;
      e.moving = true; e.moveProgress = 0;

      if (e.type === 'COWARD') {
        game.reactor.heat = Math.min(game.reactor.maxHeat + 30, game.reactor.heat + 5);
        if (game.reactor.heat >= game.reactor.maxHeat) triggerMeltdown();
      }
    }
  }

  const p = game.player;
  for (let i = game.enemies.length - 1; i >= 0; i--) {
    const e = game.enemies[i];
    if (e.col === p.col && e.row === p.row) {
      hitPlayer();
      game.enemies.splice(i, 1);
    }
  }
}

function calcEnemyPath(e) {
  const p = game.player;
  if (e.type === 'CHASER') {
    return findPath(game.grid, {col:e.col, row:e.row}, {col:p.col, row:p.row});
  }
  if (e.type === 'SABOTEUR') {
    let nearestBomb = null, minDist = Infinity;
    for (const b of game.bombs) {
      if (b.exploding) continue;
      const d = Math.abs(b.col - e.col) + Math.abs(b.row - e.row);
      if (d < minDist) { minDist = d; nearestBomb = b; }
    }
    if (nearestBomb) {
      return findPath(game.grid, {col:e.col, row:e.row}, {col:nearestBomb.col, row:nearestBomb.row});
    }
    return findPath(game.grid, {col:e.col, row:e.row}, {col:p.col, row:p.row});
  }
  if (e.type === 'COWARD') {
    const dirs = [{dc:0,dr:-1},{dc:0,dr:1},{dc:-1,dr:0},{dc:1,dr:0}];
    let bestDir = null, bestScore = -Infinity;
    for (const d of dirs) {
      const nc = e.col + d.dc, nr = e.row + d.dr;
      if (!isPassable(nc, nr)) continue;
      if (game.bombs.find(b => b.col === nc && b.row === nr && !b.exploding)) continue;
      let score = 0;
      for (const b of game.bombs) {
        if (!b.exploding) {
          score += Math.abs(nc - b.col) + Math.abs(nr - b.row);
        }
      }
      score += (Math.abs(nc - p.col) + Math.abs(nr - p.row)) * 0.5;
      if (score > bestScore) { bestScore = score; bestDir = {col:nc, row:nr}; }
    }
    return bestDir ? [{col:bestDir.col, row:bestDir.row}] : [];
  }
  return [];
}

function checkSaboteurDefuse() {
  for (let bi = game.bombs.length - 1; bi >= 0; bi--) {
    const b = game.bombs[bi];
    if (b.exploding) continue;
    for (const e of game.enemies) {
      if (e.type === 'SABOTEUR' && e.col === b.col && e.row === b.row) {
        game.bombs.splice(bi, 1);
        addFloatingText('DEFUSED!', tileToPixel(b.col, b.row).x, tileToPixel(b.col, b.row).y, '#ff0088', 'bold 18px monospace');
        break;
      }
    }
  }
}

// ============================================================
// MAIN UPDATE
// ============================================================
const FIXED_STEP = 1000 / 60; // 16.67ms — defined here for update()
let lastTime = 0;
function update(timestamp) {
  const rawDt = FIXED_STEP; // use fixed step, driven by accumulator in gameLoop
  if (game.state !== 'playing') {
    if (game.state === 'upgrade') game.upgradeAnimTimer += rawDt;
    return;
  }

  const dt = rawDt * game.slowmo;

  // Slowmo
  if (game.slowmoTimer > 0) {
    game.slowmoTimer -= rawDt;
    if (game.slowmoTimer <= 0) { game.slowmo = 1; game.slowmoTimer = 0; }
  }

  // Reactor cooling
  game.reactor.heat = Math.max(0, game.reactor.heat - game.reactor.coolingRate * dt / 1000);
  Audio.updateAmbient(game.reactor.heat);

  // Combo timer & break detection
  if (game.comboTimer > 0) {
    game.comboTimer -= dt;
    if (game.comboTimer <= 0 && game.combo >= 2) {
      game.comboBreakTimer = 800; // show break message
      game.combo = 0;
    } else if (game.comboTimer <= 0) {
      game.combo = 0;
    }
  }
  if (game.comboBreakTimer > 0) game.comboBreakTimer -= dt;

  // Combo text scale decay (pulse)
  if (game.comboTextScale > 1) game.comboTextScale -= dt * 0.003;
  if (game.comboTextScale < 1) game.comboTextScale = 1;

  // Upgrade timer
  game.upgradeTimer += dt;
  if (game.upgradeTimer >= game.upgradeInterval && game.waveState === 'fighting') {
    game.upgradeTimer = 0;
    showUpgradeScreen();
  }

  updatePlayer(dt);
  updateEnemies(dt);
  checkSaboteurDefuse();

  // Update bombs
  for (let i = game.bombs.length - 1; i >= 0; i--) {
    const b = game.bombs[i];
    if (b.exploding) { game.bombs.splice(i, 1); continue; }
    b.timer += dt;
    b.pulsePhase += dt * 0.005;
    if (b.timer >= b.delay) {
      explodeBomb(b);
    }
  }

  // Reset chain length after all bombs processed
  // (chain length accumulates per chain sequence, reset after cooldown)
  if (game.slowmoTimer <= 0 && game.slowmo === 1) {
    // chain length is reset on new wave spawn; don't reset mid-game here
  }

  // Update explosions
  for (let i = game.explosions.length - 1; i >= 0; i--) {
    const ex = game.explosions[i];
    ex.timer += dt;
    if (ex.timer >= ex.maxTime) game.explosions.splice(i, 1);
  }

  // Update particles (pool recycling)
  for (let i = game.particles.length - 1; i >= 0; i--) {
    const p = game.particles[i];
    p.life -= dt;
    p.x += p.vx * dt / 1000;
    p.y += p.vy * dt / 1000;
    p.vy += 200 * dt / 1000;
    p.alpha = p.life / 600;
    if (p.life <= 0) {
      particlePool.push(game.particles.splice(i, 1)[0]);
    }
  }

  // Update enemy death effects
  for (let i = game.enemyDeathEffects.length - 1; i >= 0; i--) {
    const eff = game.enemyDeathEffects[i];
    eff.life -= dt;
    const prog = 1 - eff.life / eff.maxLife;
    for (const ep of eff.particles) {
      ep.x += ep.vx * dt / 1000;
      ep.y += ep.vy * dt / 1000;
      ep.vy += 120 * dt / 1000; // gravity
      ep.alpha = Math.max(0, 1 - prog);
      if (ep.isDiamond) ep.rotation += dt * 0.005;
    }
    if (eff.life <= 0) game.enemyDeathEffects.splice(i, 1);
  }

  // Update floating texts
  for (let i = game.floatingTexts.length - 1; i >= 0; i--) {
    const ft = game.floatingTexts[i];
    ft.life -= dt;
    ft.y += ft.vy * dt / 1000;
    ft.alpha = Math.max(0, ft.life / 1200);
    if (ft.life <= 0) game.floatingTexts.splice(i, 1);
  }

  // Screen shake — exponential decay
  if (game.screenShake.intensity > 0.1) {
    game.screenShake.intensity *= Math.pow(game.screenShake.decayFactor, dt / 16.67);
    game.screenShake.x = (Math.random()-0.5) * game.screenShake.intensity;
    game.screenShake.y = (Math.random()-0.5) * game.screenShake.intensity;
  } else {
    game.screenShake.intensity = 0;
    game.screenShake.x = 0;
    game.screenShake.y = 0;
  }

  // Flash decay
  if (game.flashAlpha > 0) game.flashAlpha -= dt / 200;

  // Blue flash timer
  if (game.blueFlashTimer > 0) {
    game.blueFlashTimer -= dt;
    if (game.blueFlashTimer <= 0) game.blueFlash = 0;
  }
  if (game.blueFlash > 0 && game.blueFlashTimer > 0) {
    game.blueFlash = Math.max(0, game.blueFlashTimer / 1000) * 0.4;
  }

  // Meltdown effect
  if (game.meltdownEffect > 0) game.meltdownEffect -= dt;

  // Vignette
  if (game.reactor.heat > 85) {
    game.vignetteAlpha = 0.3 + 0.2 * Math.sin(Date.now() * 0.005);
  } else {
    game.vignetteAlpha = Math.max(0, game.vignetteAlpha - dt * 0.002);
  }

  // Not enough energy flash
  if (game.notEnoughEnergyTimer > 0) game.notEnoughEnergyTimer -= dt;

  // Wave message
  if (game.waveMessageTimer > 0) game.waveMessageTimer -= dt;

  // Marching ants offset
  dashOffset += dt * 0.04;

  // Background static
  for (const sp of bgStaticPixels) {
    sp.timer += dt;
    if (sp.timer > sp.interval) {
      sp.timer = 0;
      sp.x = Math.random() * CANVAS_W;
      sp.y = Math.random() * CANVAS_H;
      sp.interval = 800 + Math.random() * 2000;
    }
  }

  // Check wave cleared
  if (game.waveState === 'fighting' && game.enemies.length === 0) {
    game.waveState = 'cleared';
    game.chainLength = 0;
    Audio.SFX.waveClear();
    const bonus = 500 * game.wave;
    game.score += bonus;
    game.waveMessage = 'WAVE ' + game.wave + ' CLEARED! +' + bonus;
    game.waveMessageTimer = 3000;
    game.waveClearTimer = 0;
    game.reactor.energy = Math.min(200, game.reactor.energy + 30);
    addFloatingText('+30 ENERGY', CANVAS_W/2, CANVAS_H/2, '#00ffff', 'bold 18px monospace');
    setTimeout(() => {
      if (game.state === 'playing') showUpgradeScreen();
    }, 2000);
  }

  if (game.waveState === 'cleared') {
    game.waveClearTimer += dt;
    if (game.waveClearTimer >= 5000 && game.state === 'playing') {
      game.wave++;
      if (game.wave > game.maxWaves) {
        game.state = 'win';
      } else {
        game.waveState = 'spawning';
        spawnWave(game.wave);
      }
    }
  }
}

// ============================================================
// DRAWING
// ============================================================
function draw(timestamp) {
  ctx.save();

  // Dark background
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // Animated background grid
  drawBackgroundGrid(timestamp);

  // Neon canvas border
  ctx.save();
  ctx.strokeStyle = '#00ffff';
  ctx.lineWidth = 1;
  ctx.shadowColor = '#00ffff';
  ctx.shadowBlur = 8;
  ctx.strokeRect(1, 1, CANVAS_W - 2, CANVAS_H - 2);
  ctx.restore();

  // Screen shake translate
  ctx.translate(game.screenShake.x, game.screenShake.y);

  if (game.state === 'start') {
    drawStartScreen(timestamp);
  } else if (game.state === 'upgrade') {
    drawGame(timestamp);
    drawUpgradeOverlay();
  } else {
    drawGame(timestamp);
    if (game.state === 'gameover') drawGameOver();
    if (game.state === 'win') drawWin();
  }

  ctx.restore();
}

function drawBackgroundGrid(timestamp) {
  // Faint animated grid
  const t = timestamp * 0.0003;
  ctx.save();
  ctx.strokeStyle = '#0a0a2e';
  ctx.lineWidth = 0.5;
  const spacing = 40;
  for (let x = 0; x < CANVAS_W; x += spacing) {
    ctx.globalAlpha = 0.4 + 0.1 * Math.sin(t + x * 0.02);
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CANVAS_H); ctx.stroke();
  }
  for (let y = 0; y < CANVAS_H; y += spacing) {
    ctx.globalAlpha = 0.4 + 0.1 * Math.sin(t + y * 0.02);
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CANVAS_W, y); ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Static flicker pixels
  for (const sp of bgStaticPixels) {
    const flicker = Math.sin(sp.timer * 0.01) > 0.7;
    if (flicker) {
      ctx.fillStyle = `rgba(100,200,255,${0.15 + Math.random() * 0.2})`;
      ctx.fillRect(sp.x, sp.y, sp.size, sp.size);
    }
  }

  ctx.restore();
}

function drawGame(timestamp) {
  drawHUD(timestamp);
  drawGrid(timestamp);
  drawBombPreviews(timestamp);
  drawExplosions();
  drawBombs(timestamp);
  drawEnemies(timestamp);
  drawPlayer(timestamp);
  drawParticles();
  drawEnemyDeathEffects();
  drawFloatingTexts();
  drawScreenEffects(timestamp);
  drawCombo(timestamp);
  drawTopBar(timestamp);
  drawBottomBar();
  if (game.waveMessageTimer > 0) drawWaveMessage();
  if (game.notEnoughEnergyTimer > 0) drawEnergyWarning();
  if (game.meltdownEffect > 0) drawMeltdownOverlay();
  // Mobile overlay
  if (joystick.active || window.innerWidth < 1024) {
    drawJoystick();
    drawBombButton();
  }
}

function drawGrid(timestamp) {
  for (let r = 0; r < GRID_ROWS; r++) {
    for (let c = 0; c < GRID_COLS; c++) {
      const x = GRID_OFFSET_X + c * TILE;
      const y = GRID_OFFSET_Y + r * TILE;
      const t = game.grid[r][c];
      if (t.type === T_WALL) {
        ctx.fillStyle = '#0d0d2a';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.strokeStyle = '#00ffff';
        ctx.lineWidth = 1;
        ctx.strokeRect(x+1, y+1, TILE-2, TILE-2);
        const grd = ctx.createLinearGradient(x, y, x+TILE, y+TILE);
        grd.addColorStop(0, 'rgba(0,255,255,0.05)');
        grd.addColorStop(1, 'rgba(0,100,200,0.1)');
        ctx.fillStyle = grd;
        ctx.fillRect(x+2, y+2, TILE-4, TILE-4);
      } else if (t.type === T_SOFT) {
        ctx.fillStyle = '#1a0a2a';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.strokeStyle = '#8844cc';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(x+2, y+2, TILE-4, TILE-4);
        ctx.strokeStyle = 'rgba(136,68,204,0.3)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(x+8, y+8); ctx.lineTo(x+TILE-8, y+TILE-8);
        ctx.moveTo(x+TILE-8, y+8); ctx.lineTo(x+8, y+TILE-8);
        ctx.stroke();
        // Subtle hex texture dots
        ctx.fillStyle = 'rgba(136,68,204,0.08)';
        const hx = x + TILE/2, hy = y + TILE/2;
        ctx.beginPath(); ctx.arc(hx, hy, 3, 0, Math.PI*2); ctx.fill();
      } else {
        // Floor: subtle hex pattern
        ctx.fillStyle = '#0a0a1a';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.strokeStyle = '#131328';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(x, y, TILE, TILE);
        // Tiny hex lines
        ctx.strokeStyle = 'rgba(0,80,120,0.08)';
        ctx.lineWidth = 0.3;
        const cx2 = x + TILE/2, cy2 = y + TILE/2;
        const hr = 8;
        ctx.beginPath();
        for (let hi = 0; hi < 6; hi++) {
          const ang = (Math.PI/3)*hi;
          if (hi === 0) ctx.moveTo(cx2 + Math.cos(ang)*hr, cy2 + Math.sin(ang)*hr);
          else ctx.lineTo(cx2 + Math.cos(ang)*hr, cy2 + Math.sin(ang)*hr);
        }
        ctx.closePath();
        ctx.stroke();
      }
    }
  }
}

function drawBombPreviews(timestamp) {
  if (!game.player || game.player.moving) return;
  const previewTiles = getPreviewTiles();
  const btype = BOMB_TYPES[game.player.selectedBomb];

  let heatAfter = game.reactor.heat + btype.heat;
  if (game.player.selectedBomb === 'BASIC') heatAfter -= game.heatSinkBonus;

  for (const tile of previewTiles) {
    const x = GRID_OFFSET_X + tile.col * TILE;
    const y = GRID_OFFSET_Y + tile.row * TILE;

    const hasEnemy = game.enemies.find(e => e.col === tile.col && e.row === tile.row);
    const hasCoward = hasEnemy && hasEnemy.type === 'COWARD';

    let col;
    if (hasEnemy && !hasCoward) {
      col = 'rgba(255,30,30,0.3)'; // red for enemy tile
    } else if (heatAfter > 85) {
      col = 'rgba(255,80,0,0.3)';
    } else if (hasCoward) {
      col = 'rgba(255,200,0,0.3)';
    } else {
      col = 'rgba(0,255,255,0.12)';
    }

    // Inner glow matching bomb color
    ctx.save();
    const r2 = parseInt(btype.color.slice(1,3), 16);
    const g2 = parseInt(btype.color.slice(3,5), 16);
    const b2_val = parseInt(btype.color.slice(5,7), 16);
    const glowGrd = ctx.createRadialGradient(x+TILE/2, y+TILE/2, 2, x+TILE/2, y+TILE/2, TILE/2);
    glowGrd.addColorStop(0, `rgba(${r2},${g2},${b2_val},0.18)`);
    glowGrd.addColorStop(1, `rgba(${r2},${g2},${b2_val},0)`);
    ctx.fillStyle = glowGrd;
    ctx.fillRect(x, y, TILE, TILE);
    ctx.restore();

    ctx.fillStyle = col;
    ctx.fillRect(x+2, y+2, TILE-4, TILE-4);

    // Skull icon on enemy tile
    if (hasEnemy && !hasCoward) {
      ctx.save();
      ctx.font = '20px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = '#ff4444';
      ctx.fillText('\u2620', x + TILE/2, y + TILE/2);
      ctx.restore();
    }

    // Animated dashed border (marching ants)
    ctx.save();
    ctx.strokeStyle = hasEnemy ? '#ff4444' : btype.color;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 4]);
    ctx.lineDashOffset = -dashOffset;
    ctx.shadowColor = btype.color;
    ctx.shadowBlur = 6;
    ctx.strokeRect(x+3, y+3, TILE-6, TILE-6);
    ctx.setLineDash([]);
    ctx.restore();
  }

  // Bomb type indicator next to player tile
  const px = GRID_OFFSET_X + game.player.col * TILE;
  const py = GRID_OFFSET_Y + game.player.row * TILE;
  ctx.save();
  ctx.fillStyle = btype.color;
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'left';
  ctx.shadowColor = btype.color;
  ctx.shadowBlur = 8;
  ctx.fillText(btype.name, px + TILE + 2, py + 12);
  ctx.restore();
}

function drawExplosions() {
  for (const ex of game.explosions) {
    const x = GRID_OFFSET_X + ex.col * TILE;
    const y = GRID_OFFSET_Y + ex.row * TILE;
    const prog = ex.timer / ex.maxTime;
    const alpha = 1 - prog;
    if (prog < 0.2) {
      ctx.fillStyle = `rgba(255,255,255,${alpha * 5})`;
    } else {
      const r = parseInt(ex.color.slice(1,3), 16);
      const g = parseInt(ex.color.slice(3,5), 16);
      const b2 = parseInt(ex.color.slice(5,7), 16);
      ctx.fillStyle = `rgba(${r},${g},${b2},${alpha * 0.8})`;
    }
    ctx.fillRect(x, y, TILE, TILE);

    // Glow
    ctx.save();
    ctx.shadowColor = ex.color;
    ctx.shadowBlur = 20 * (1 - prog);
    ctx.fillStyle = `rgba(255,255,255,${alpha * 0.1})`;
    ctx.fillRect(x, y, TILE, TILE);
    ctx.restore();
  }
}

function drawBombs(timestamp) {
  for (const b of game.bombs) {
    if (b.exploding) continue;
    const x = GRID_OFFSET_X + b.col * TILE + TILE/2;
    const y = GRID_OFFSET_Y + b.row * TILE + TILE/2;
    const pulse = 0.9 + 0.1 * Math.sin(b.pulsePhase * Math.PI * 2);
    const prog = b.timer / b.delay;

    ctx.save();
    ctx.translate(x, y);
    ctx.scale(pulse, pulse);

    ctx.shadowColor = b.color;
    ctx.shadowBlur = 18;

    ctx.beginPath();
    ctx.arc(0, 0, 12, 0, Math.PI*2);
    ctx.fillStyle = b.color;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(0, 0, 16, -Math.PI/2, -Math.PI/2 + Math.PI*2*prog);
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = '#000020';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(b.type[0], 0, 0);

    ctx.restore();
  }
}

function drawEnemies(timestamp) {
  for (const e of game.enemies) {
    const x = e.px, y = e.py;
    ctx.save();
    ctx.shadowColor = e.color;
    ctx.shadowBlur = e.frozen ? 20 : 10;

    const col = e.frozen ? '#88ccff' : e.color;
    ctx.fillStyle = col;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1.5;

    if (e.type === 'CHASER') {
      ctx.beginPath();
      ctx.arc(x, y, 18, 0, Math.PI*2);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(x-6, y-5, 4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+6, y-5, 4, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(x-6, y-5, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+6, y-5, 2, 0, Math.PI*2); ctx.fill();
    } else if (e.type === 'SABOTEUR') {
      ctx.beginPath();
      ctx.moveTo(x, y-20); ctx.lineTo(x+16, y); ctx.lineTo(x, y+20); ctx.lineTo(x-16, y);
      ctx.closePath(); ctx.fill(); ctx.stroke();
    } else if (e.type === 'COWARD') {
      ctx.fillRect(x-14, y-14, 28, 28);
      ctx.strokeRect(x-14, y-14, 28, 28);
      ctx.fillStyle = '#aaccff';
      ctx.beginPath(); ctx.arc(x+12, y-10, 3, 0, Math.PI*2); ctx.fill();
    }

    if (e.hp > 1) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(x-16, y+20, 32, 4);
      ctx.fillStyle = '#00ff00';
      ctx.fillRect(x-16, y+20, 32 * (e.hp/2), 4);
    }

    if (e.frozen) {
      ctx.strokeStyle = '#00aaff';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(x, y, 22, 0, Math.PI*2);
      ctx.stroke();
    }

    ctx.restore();
  }
}

function drawPlayer(timestamp) {
  const p = game.player;
  const x = p.px, y = p.py;
  const invincFlicker = p.invincible > 0 && Math.floor(timestamp / 100) % 2 === 0;
  if (invincFlicker) return;

  const tx = GRID_OFFSET_X + p.col * TILE;
  const ty = GRID_OFFSET_Y + p.row * TILE;
  ctx.fillStyle = 'rgba(0,255,255,0.08)';
  ctx.fillRect(tx, ty, TILE, TILE);
  ctx.strokeStyle = 'rgba(0,255,255,0.4)';
  ctx.lineWidth = 1;
  ctx.strokeRect(tx, ty, TILE, TILE);

  ctx.save();
  ctx.translate(x, y);
  ctx.shadowColor = '#00ffff';
  ctx.shadowBlur = 20;

  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI/3) * i - Math.PI/6;
    const r = 18;
    if (i === 0) ctx.moveTo(Math.cos(angle)*r, Math.sin(angle)*r);
    else ctx.lineTo(Math.cos(angle)*r, Math.sin(angle)*r);
  }
  ctx.closePath();
  ctx.fillStyle = '#003333';
  ctx.fill();
  ctx.strokeStyle = '#00ffff';
  ctx.lineWidth = 2.5;
  ctx.stroke();

  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI/3) * i - Math.PI/6;
    const r = 10;
    if (i === 0) ctx.moveTo(Math.cos(angle)*r, Math.sin(angle)*r);
    else ctx.lineTo(Math.cos(angle)*r, Math.sin(angle)*r);
  }
  ctx.closePath();
  ctx.fillStyle = '#00ffff';
  ctx.fill();

  ctx.restore();
}

function drawParticles() {
  for (const p of game.particles) {
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 5;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function drawEnemyDeathEffects() {
  for (const eff of game.enemyDeathEffects) {
    for (const ep of eff.particles) {
      ctx.save();
      ctx.globalAlpha = ep.alpha;
      ctx.fillStyle = ep.color;
      ctx.strokeStyle = ep.color;
      ctx.shadowColor = ep.color;
      ctx.shadowBlur = 8;
      if (ep.isDiamond) {
        ctx.translate(ep.x, ep.y);
        ctx.rotate(ep.rotation);
        ctx.beginPath();
        ctx.moveTo(0, -ep.size);
        ctx.lineTo(ep.size * 0.6, 0);
        ctx.lineTo(0, ep.size);
        ctx.lineTo(-ep.size * 0.6, 0);
        ctx.closePath();
        ctx.fill();
      } else {
        ctx.beginPath();
        ctx.arc(ep.x, ep.y, ep.size, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    }
  }
}

function drawFloatingTexts() {
  for (const ft of game.floatingTexts) {
    ctx.save();
    ctx.globalAlpha = ft.alpha;
    ctx.fillStyle = ft.color;
    ctx.shadowColor = ft.color;
    ctx.shadowBlur = 12;
    ctx.font = ft.font || 'bold 22px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.restore();
  }
}

function drawCombo(timestamp) {
  if (game.combo < 2 && game.comboBreakTimer <= 0) return;

  ctx.save();

  if (game.comboBreakTimer > 0) {
    // Combo break flash
    const alpha = Math.min(1, game.comboBreakTimer / 400);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#999999';
    ctx.font = 'bold 36px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('COMBO BREAK', CANVAS_W/2, CANVAS_H/2 - 130);
  } else {
    // Active combo display
    const c = game.combo;
    const baseSize = Math.min(48 + (c - 2) * 6, 96);
    const scale = game.comboTextScale;
    const shakeX = c >= 10 ? (Math.random() - 0.5) * 6 : 0;
    const shakeY = c >= 10 ? (Math.random() - 0.5) * 6 : 0;

    let comboColor;
    if (c >= 10) comboColor = '#ff2200';
    else if (c >= 5) comboColor = '#ff8800';
    else comboColor = '#00ffff';

    // Fade out as timer gets low
    const fadeAlpha = game.comboTimer < 400 ? game.comboTimer / 400 : 1;
    ctx.globalAlpha = fadeAlpha;

    ctx.save();
    ctx.translate(CANVAS_W/2 + shakeX, CANVAS_H/2 - 130 + shakeY);
    ctx.scale(scale, scale);
    ctx.font = `bold ${baseSize}px monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = comboColor;
    ctx.shadowColor = comboColor;
    ctx.shadowBlur = c >= 10 ? 40 : 20;
    ctx.fillText('x' + c + ' COMBO', 0, 0);
    ctx.restore();
  }

  ctx.restore();
}

function drawScreenEffects(timestamp) {
  // White flash
  if (game.flashAlpha > 0) {
    ctx.fillStyle = `rgba(255,255,255,${Math.max(0, game.flashAlpha)})`;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  }

  // Blue freeze tint (cryo — 1 second duration)
  if (game.blueFlash > 0) {
    ctx.fillStyle = `rgba(0,100,255,${Math.max(0, Math.min(0.15, game.blueFlash))})`;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  }

  // Red vignette (radial gradient)
  if (game.vignetteAlpha > 0) {
    const grd = ctx.createRadialGradient(CANVAS_W/2, CANVAS_H/2, 180, CANVAS_W/2, CANVAS_H/2, CANVAS_W/2);
    grd.addColorStop(0, 'rgba(255,0,0,0)');
    grd.addColorStop(0.6, `rgba(255,0,0,${game.vignetteAlpha * 0.3})`);
    grd.addColorStop(1, `rgba(255,0,0,${game.vignetteAlpha})`);
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  }

  // Permanent dark vignette at edges
  const vgrd = ctx.createRadialGradient(CANVAS_W/2, CANVAS_H/2, 300, CANVAS_W/2, CANVAS_H/2, CANVAS_W * 0.72);
  vgrd.addColorStop(0, 'rgba(0,0,0,0)');
  vgrd.addColorStop(1, 'rgba(0,0,20,0.5)');
  ctx.fillStyle = vgrd;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
}

function drawHUD(timestamp) {
  const heatPct = game.reactor.heat / game.reactor.maxHeat;

  // Left HUD panel — glow when heat > 70%
  ctx.save();
  if (heatPct > 0.7) {
    const glowIntensity = (heatPct - 0.7) / 0.3;
    ctx.shadowColor = `rgba(255,${Math.floor(100*(1-glowIntensity))},0,1)`;
    ctx.shadowBlur = 20 * glowIntensity;
  }
  ctx.fillStyle = '#080818';
  ctx.fillRect(0, 40, 95, CANVAS_H - 100);
  ctx.strokeStyle = heatPct > 0.7 ? `rgba(255,${Math.floor(100*(1-heatPct))},0,${0.6+0.4*heatPct})` : '#00ffff';
  ctx.lineWidth = 1;
  ctx.strokeRect(0, 40, 95, CANVAS_H - 100);
  ctx.restore();

  ctx.fillStyle = '#00ffff';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('REACTOR', 47, 62);

  // Heat bar (vertical)
  const barX = 20, barY = 70, barW = 55, barH = 160;
  ctx.fillStyle = '#0a0a2a';
  ctx.fillRect(barX, barY, barW, barH);
  const heatH = barH * Math.min(heatPct, 1);
  const heatCol = heatPct > 0.85 ? '#ff2200' : heatPct > 0.6 ? '#ff8800' : '#00ff88';

  // Pulse opacity at >85%
  let barAlpha = 1;
  if (heatPct > 0.85) {
    barAlpha = 0.7 + 0.3 * Math.sin(Date.now() * 0.025); // ~4Hz
  }
  ctx.save();
  ctx.globalAlpha = barAlpha;
  ctx.fillStyle = heatCol;
  ctx.shadowColor = heatCol;
  ctx.shadowBlur = heatPct > 0.85 ? 12 : 0;
  ctx.fillRect(barX, barY + barH - heatH, barW, heatH);
  ctx.restore();

  // Tick marks at 50% and 85%
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 1;
  const tick50y = barY + barH - barH * 0.5;
  const tick85y = barY + barH - barH * 0.85;
  ctx.beginPath();
  ctx.moveTo(barX, tick50y); ctx.lineTo(barX + barW, tick50y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(barX, tick85y); ctx.lineTo(barX + barW, tick85y);
  ctx.stroke();
  // Tick labels
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '7px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('50', barX - 2, tick50y + 3);
  ctx.fillText('85', barX - 2, tick85y + 3);
  ctx.textAlign = 'center';

  // Cooling arrows when heat > 0 and declining
  if (game.reactor.heat > 5 && heatPct < 0.85) {
    const arrowT = (Date.now() * 0.003) % 1;
    for (let ai = 0; ai < 3; ai++) {
      const arrowFrac = ((arrowT + ai / 3) % 1);
      const ay = barY + (barH - heatH) + heatH * arrowFrac;
      const arrowAlpha = 0.3 + 0.4 * Math.sin(arrowFrac * Math.PI);
      ctx.save();
      ctx.globalAlpha = arrowAlpha;
      ctx.fillStyle = '#44aaff';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('\u2193', barX + barW/2, ay);
      ctx.restore();
    }
  }

  ctx.strokeStyle = '#00ffff';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, barY, barW, barH);

  // Heat text
  ctx.fillStyle = heatCol;
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(Math.round(game.reactor.heat) + '\u00B0', 47, 245);

  if (heatPct > 0.85) {
    const blinkAlpha = 0.5 + 0.5 * Math.sin(Date.now() * 0.015);
    ctx.fillStyle = `rgba(255,30,0,${blinkAlpha})`;
    ctx.font = 'bold 8px monospace';
    ctx.fillText('\u26A0 CRITICAL', 47, 260);
  }

  // Energy section
  ctx.fillStyle = '#ffdd00';
  ctx.font = 'bold 9px monospace';
  ctx.fillText('ENERGY', 47, 285);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 12px monospace';
  ctx.fillText(Math.round(game.reactor.energy), 47, 302);

  // Energy bar with cyan glow
  const ePct = game.reactor.energy / 200;
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(10, 308, 75, 10);
  ctx.save();
  ctx.fillStyle = '#00ffee';
  ctx.shadowColor = '#00ffee';
  ctx.shadowBlur = 8 * ePct;
  ctx.fillRect(10, 308, 75 * ePct, 10);
  ctx.restore();
  ctx.strokeStyle = '#004444';
  ctx.strokeRect(10, 308, 75, 10);

  // Lightning icon
  ctx.fillStyle = '#00ffee';
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('\u26A1', 10, 325);
  ctx.textAlign = 'center';

  // Lives — animated hearts
  ctx.fillStyle = '#ff4466';
  ctx.font = '18px monospace';
  for (let i = 0; i < 3; i++) {
    let heartScale = 1;
    if (i >= game.player.lives && game.player.livesFlash > 0) {
      // pulse on the lost heart
      heartScale = 1 + 0.3 * Math.sin(game.player.livesFlash * 0.015);
    } else if (i < game.player.lives && game.player.livesFlash > 0) {
      heartScale = 1 + 0.15 * Math.sin(game.player.livesFlash * 0.02);
    }
    ctx.globalAlpha = i < game.player.lives ? 1 : 0.2;
    ctx.save();
    const hx = 15 + i * 26 + 9, hy = 337;
    ctx.translate(hx, hy);
    ctx.scale(heartScale, heartScale);
    ctx.fillText('\u2665', -9, 0);
    ctx.restore();
  }
  ctx.globalAlpha = 1;

  // Cooling rate
  ctx.fillStyle = '#556677';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('COOL: '+game.reactor.coolingRate+'/s', 47, 365);

  // Right HUD panel
  ctx.fillStyle = '#080818';
  ctx.fillRect(805, 40, 95, CANVAS_H - 100);
  ctx.strokeStyle = '#00ffff';
  ctx.lineWidth = 1;
  ctx.strokeRect(805, 40, 95, CANVAS_H - 100);

  // Wave info with dot progress
  ctx.fillStyle = '#00ffff';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('WAVE ' + game.wave + '/' + game.maxWaves, 852, 62);

  // Wave progress dots
  const dotSpacing = 8;
  const totalDots = game.maxWaves;
  const dotsStartX = 852 - (totalDots * dotSpacing) / 2 + dotSpacing / 2;
  for (let d = 0; d < totalDots; d++) {
    ctx.fillStyle = d < game.wave ? '#00ffff' : '#223344';
    ctx.shadowColor = d < game.wave ? '#00ffff' : 'transparent';
    ctx.shadowBlur = d < game.wave ? 4 : 0;
    ctx.beginPath();
    ctx.arc(dotsStartX + d * dotSpacing, 74, 2.5, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  // Score
  ctx.fillStyle = '#ffdd00';
  ctx.font = '9px monospace';
  ctx.fillText('SCORE', 852, 92);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 11px monospace';
  ctx.fillText(game.score.toString(), 852, 107);

  // Bomb selection
  ctx.fillStyle = '#aaaaaa';
  ctx.font = '9px monospace';
  ctx.fillText('BOMBS', 852, 130);

  let by = 145;
  for (const bname of BOMB_ORDER) {
    const bt = BOMB_TYPES[bname];
    const selected = game.player.selectedBomb === bname;
    if (selected) {
      ctx.save();
      ctx.fillStyle = bt.color + '33';
      ctx.fillRect(808, by-12, 89, 16);
      ctx.strokeStyle = bt.color;
      ctx.shadowColor = bt.color;
      ctx.shadowBlur = 8;
      ctx.lineWidth = 1;
      ctx.strokeRect(808, by-12, 89, 16);
      ctx.restore();
    }
    ctx.fillStyle = bt.color;
    ctx.font = (selected ? 'bold ' : '') + '9px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(bt.key+':'+bname, 812, by);
    if (bt.energyCost > 0) {
      ctx.fillStyle = '#ffdd00';
      ctx.font = '8px monospace';
      ctx.fillText(bt.energyCost+'e', 860, by);
    }
    ctx.textAlign = 'center';
    by += 20;
  }

  // Reactor shield indicator
  if (game.reactorShield > 0) {
    ctx.fillStyle = '#00ff88';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SHIELD: '+game.reactorShield, 852, 265);
  }

  // Kills
  ctx.fillStyle = '#888888';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('KILLS: ' + game.kills, 852, 285);

  // Bombs on field
  const activeBombs = game.bombs.filter(b => !b.exploding).length;
  ctx.fillStyle = activeBombs >= game.maxBombs ? '#ff4444' : '#aaaaaa';
  ctx.fillText('BOMBS: '+activeBombs+'/'+game.maxBombs, 852, 303);
}

function drawUpgradeOverlay() {
  // Scanline dark overlay
  ctx.fillStyle = 'rgba(0,0,10,0.85)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // Scanlines effect
  for (let sy = 0; sy < CANVAS_H; sy += 3) {
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.fillRect(0, sy, CANVAS_W, 1);
  }

  // Pulsing title
  const tPulse = 0.7 + 0.3 * Math.sin(Date.now() * 0.004);
  ctx.save();
  ctx.fillStyle = `rgba(0,255,255,${tPulse})`;
  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#00ffff';
  ctx.shadowBlur = 20 * tPulse;
  ctx.fillText('UPGRADE AVAILABLE', CANVAS_W/2, 100);
  ctx.shadowBlur = 0;

  // Brief current stats
  ctx.fillStyle = '#556677';
  ctx.font = '11px monospace';
  ctx.fillText('Score: ' + game.score + '  |  Kills: ' + game.kills + '  |  Wave: ' + game.wave, CANVAS_W/2, 128);
  ctx.restore();

  const cardW = 220, cardH = 150, gap = 20;
  const totalW = 3 * cardW + 2 * gap;
  const startX = (CANVAS_W - totalW) / 2;
  const cardY = 170;

  // Cards animate in from bottom
  const animProg = Math.min(1, game.upgradeAnimTimer / 300);
  const slideOffset = (1 - animProg) * 60;

  const cardColors = ['#00ffff', '#ff00ff', '#00ff88'];
  const cardGlowIds = ['cooling', 'chain_amp', 'energy'];

  for (let i = 0; i < game.upgradeChoices.length; i++) {
    const u = game.upgradeChoices[i];
    const cx = startX + i * (cardW + gap);
    const cy = cardY + slideOffset;
    const cardAlpha = animProg;

    ctx.save();
    ctx.globalAlpha = cardAlpha;

    // Card background
    ctx.fillStyle = '#0a0a25';
    ctx.beginPath();
    // Rounded rect
    const cr = 8;
    ctx.moveTo(cx + cr, cy);
    ctx.lineTo(cx + cardW - cr, cy);
    ctx.quadraticCurveTo(cx + cardW, cy, cx + cardW, cy + cr);
    ctx.lineTo(cx + cardW, cy + cardH - cr);
    ctx.quadraticCurveTo(cx + cardW, cy + cardH, cx + cardW - cr, cy + cardH);
    ctx.lineTo(cx + cr, cy + cardH);
    ctx.quadraticCurveTo(cx, cy + cardH, cx, cy + cardH - cr);
    ctx.lineTo(cx, cy + cr);
    ctx.quadraticCurveTo(cx, cy, cx + cr, cy);
    ctx.closePath();
    ctx.fill();

    // Neon border with glow
    ctx.strokeStyle = cardColors[i];
    ctx.lineWidth = 2;
    ctx.shadowColor = cardColors[i];
    ctx.shadowBlur = 15;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Key hint
    ctx.fillStyle = cardColors[i];
    ctx.font = 'bold 30px monospace';
    ctx.textAlign = 'center';
    ctx.shadowColor = cardColors[i];
    ctx.shadowBlur = 10;
    ctx.fillText('' + (i+1), cx + cardW/2, cy + 48);
    ctx.shadowBlur = 0;

    // Name
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 13px monospace';
    ctx.fillText(u.name, cx + cardW/2, cy + 78);

    // Description
    ctx.fillStyle = '#aaaaaa';
    ctx.font = '11px monospace';
    const words = u.desc.split(' ');
    let line = '', lines = [], lineY = cy + 98;
    for (const word of words) {
      const test = line + word + ' ';
      if (ctx.measureText(test).width > cardW - 20 && line !== '') {
        lines.push(line.trim());
        line = word + ' ';
      } else {
        line = test;
      }
    }
    if (line) lines.push(line.trim());
    for (const l of lines) {
      ctx.fillText(l, cx + cardW/2, lineY);
      lineY += 16;
    }

    ctx.restore();
  }

  ctx.save();
  ctx.fillStyle = '#556677';
  ctx.font = '13px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Press 1, 2 or 3 to select', CANVAS_W/2, cardY + cardH + slideOffset + 40);
  ctx.restore();
}
