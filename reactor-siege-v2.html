  const btypes = [
    {name:'BASIC', desc:'Free \u00B7 Fast \u00B7 Reliable', color:'#00ffff'},
    {name:'CHAIN', desc:'Triggers others \u00B7 Slowmo', color:'#ff00ff'},
    {name:'CRYO', desc:'Cools reactor \u00B7 Freezes', color:'#00aaff'},
    {name:'NUKE', desc:'Massive power \u00B7 High heat', color:'#ff4400'},
  ];
  for (let i = 0; i < btypes.length; i++) {
    const bx = CANVAS_W/2 - 280 + i * 185;
    ctx.fillStyle = btypes[i].color;
    ctx.font = 'bold 11px monospace';
    ctx.fillText(btypes[i].name, bx, 725);
    ctx.fillStyle = '#667788';
    ctx.font = '10px monospace';
    ctx.fillText(btypes[i].desc, bx, 742);
  }
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  ctx.fillStyle = '#ff2200';
  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#ff2200';
  ctx.shadowBlur = 30;
  ctx.fillText('GAME OVER', CANVAS_W/2, 280);
  ctx.shadowBlur = 0;

  drawRunStats();

  ctx.fillStyle = '#aaaaaa';
  ctx.font = '18px monospace';
  ctx.fillText('Press R to restart', CANVAS_W/2, 580);
}

function drawWin() {
  ctx.fillStyle = 'rgba(0,5,0,0.8)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  ctx.fillStyle = '#00ff88';
  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#00ff88';
  ctx.shadowBlur = 30;
  ctx.fillText('VICTORY!', CANVAS_W/2, 250);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#00ffff';
  ctx.font = '20px monospace';
  ctx.fillText('All 8 waves survived!', CANVAS_W/2, 300);

  drawRunStats();

  ctx.fillStyle = '#aaaaaa';
  ctx.font = '18px monospace';
  ctx.fillText('Press R to play again', CANVAS_W/2, 580);
}

function drawRunStats() {
  const elapsed = Math.floor((Date.now() - game.startTime) / 1000);
  const mins = Math.floor(elapsed / 60), secs = elapsed % 60;
  const stats = [
    ['FINAL SCORE', game.score],
    ['ENEMIES KILLED', game.kills],
    ['WAVES CLEARED', game.wave - (game.waveState === 'fighting' ? 1 : 0)],
    ['EXPLOSIONS', game.totalExplosions],
    ['TIME', mins + ':' + secs.toString().padStart(2,'0')]
  ];
  const sy = 340;
  for (let i = 0; i < stats.length; i++) {
    ctx.fillStyle = '#556677';
    ctx.font = '14px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(stats[i][0], CANVAS_W/2 - 10, sy + i * 35);
    ctx.fillStyle = '#00ffff';
    ctx.textAlign = 'left';
    ctx.fillText(stats[i][1], CANVAS_W/2 + 10, sy + i * 35);
  }
}

// ============================================================
// GAME LOOP — fixed timestep accumulator + adaptive quality
// ============================================================
let accumulator = 0;
let fpsSmooth = 60;
let qualityLevel = 1; // 1 = full, 0.7 = reduced, 0.5 = minimal

function gameLoop(timestamp) {
  const rawDelta = Math.min(timestamp - lastTime, 100);
  lastTime = timestamp;

  // FPS smoothing
  fpsSmooth += (1000 / Math.max(rawDelta, 1) - fpsSmooth) * 0.05;
  if      (fpsSmooth < 30) qualityLevel = 0.5;
  else if (fpsSmooth < 50) qualityLevel = 0.7;
  else                     qualityLevel = 1.0;

  // Fixed timestep accumulator
  accumulator += rawDelta;
  while (accumulator >= FIXED_STEP) {
    update(timestamp);
    accumulator -= FIXED_STEP;
  }

  draw(timestamp);
  requestAnimationFrame(gameLoop);
}

// ============================================================
// PERF — object pool for particles
// ============================================================
const particlePool = [];
const MAX_PARTICLES = 200;

function _addParticleRaw(x, y, color, size) {
  if (game.particles.length >= MAX_PARTICLES) return;
  const p = particlePool.pop() || {};
  p.x = x; p.y = y;
  p.vx = (Math.random()-0.5)*150;
  p.vy = (Math.random()-0.5)*150 - 60;
  p.size = size; p.color = color;
  p.alpha = 1; p.life = 600;
  game.particles.push(p);
}

// Patch addParticle to use pool + quality scaling
const isMobile = window.innerWidth < 768;
window.addParticle = function(x, y, color, size) {
  // Skip based on quality level — more aggressively on mobile
  const skipChance = isMobile ? 0.6 : (1 - qualityLevel);
  if (Math.random() < skipChance) return;
  _addParticleRaw(x, y, color, size);
};

// Particle recycling is handled inline in the update loop (pool.push on death)

// ============================================================
// PWA — register service worker
// ============================================================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ============================================================
// INIT & START
// ============================================================
initGame();
// Home music plays automatically via <audio autoplay> element
requestAnimationFrame((ts) => { lastTime = ts; accumulator = 0; requestAnimationFrame(gameLoop); });
</script>
